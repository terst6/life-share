name: Auto Translate Logs

on:
  push:
    paths:
      - 'logs/**.md'     # 只有 logs 目录下的 md 文件变动时触发
      - 'scripts/**'     # 脚本变动时也触发测试
  workflow_dispatch:      # 允许手动触发执行

jobs:
  build-and-translate:
    runs-on: ubuntu-latest
    
    # 必须授予写权限，否则无法提交翻译后的内容
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          # 取回所有历史记录，确保能够 push
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        # 即使没有 package.json 也可以直接安装所需库
        run: npm install @vitalets/google-translate-api

      - name: Run Translation Script
        run: node scripts/translate.js

      - name: Sync README to root
        run: |
          # 假设你要同步的文件是 logs/README.md
          # 使用 cp -f 强制覆盖根目录的 README
          cp -f logs/README.md ./README.md
          echo "已同步 logs/README.md 到根目录"

      - name: Wait for Disk Sync
        run: sleep 2 # 给文件系统 2 秒钟反应时间，确保所有文件写入已落盘

      - name: Commit and Push Changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          # 确保 add 包含了根目录的 README
          git add logs/*.md README.md
          git diff --staged --quiet || (git commit -m "docs: update translations and sync root README" && git push)

      - name: Commit and Push Changes
        run: |
          # 检查是否有文件被修改，避免没有变动时 commit 报错
          if [[ -n "$(git status --porcelain)" ]]; then
            git config --local user.email "github-actions[bot]@users.noreply.github.com"
            git config --local user.name "github-actions[bot]"
            git add logs/*.md
            git commit -m "docs: auto-translate logs contents [skip ci]"
            git push
          else
            echo "No changes detected, skipping commit."
          fi